<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 300" width="1180" height="300" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="ARIA IPS Map — real-time traffic visualization (illustrative)">
  <defs>
    <linearGradient id="ipbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1020"/><stop offset="1" stop-color="#060912"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arcR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0"/><stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="arcG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0"/><stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="1180" height="300" rx="18" fill="url(#ipbg)"/>

  <!-- lat/long grid -->
  <g stroke="#13203a" stroke-width="1">
    <line x1="0" y1="75" x2="1180" y2="75"/><line x1="0" y1="150" x2="1180" y2="150"/><line x1="0" y1="225" x2="1180" y2="225"/>
    <line x1="196" y1="0" x2="196" y2="300"/><line x1="393" y1="0" x2="393" y2="300"/><line x1="590" y1="0" x2="590" y2="300"/><line x1="786" y1="0" x2="786" y2="300"/><line x1="983" y1="0" x2="983" y2="300"/>
  </g>

  <!-- header -->
  <text x="34" y="40" font-size="15" font-weight="800" letter-spacing="2" fill="#7dd3fc">IPS MAP — REAL-TIME TRAFFIC VISUALIZATION</text>
  <text x="34" y="59" font-size="11" fill="#64748b">attacker geolocation → ARIA correlation hub · blocked / allowed / whitelisted decisions · illustrative</text>

  <!-- central hub (Brain VM) -->
  <g>
    <circle cx="590" cy="170" r="46" fill="url(#hub)"/>
    <circle cx="590" cy="170" r="20" fill="#0b1426" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="590" cy="170" r="20" fill="none" stroke="#22d3ee" stroke-width="2">
      <animate attributeName="r" values="20;44;20" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="590" y="175" text-anchor="middle" font-size="12" font-weight="800" fill="#e2e8f0">ARIA</text>
    <text x="590" y="210" text-anchor="middle" font-size="10" fill="#64748b">Brain VM · IPS engine</text>
  </g>

  <!-- source nodes + arcs. Each: pulsing source, an arc to hub, a packet travelling -->
  <!-- blocked (red) sources -->
  <g>
    <path id="a1" d="M120,120 Q360,40 590,170" fill="none" stroke="url(#arcR)" stroke-width="2" opacity="0.55"/>
    <circle cx="120" cy="120" r="5" fill="#ef4444"><animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/></circle>
    <circle r="3.5" fill="#fecaca"><animateMotion dur="2.4s" repeatCount="indefinite" path="M120,120 Q360,40 590,170"/></circle>
    <text x="108" y="108" font-size="9" fill="#94a3b8">45.83.x · CN</text>
  </g>
  <g>
    <path id="a2" d="M250,250 Q400,250 590,170" fill="none" stroke="url(#arcR)" stroke-width="2" opacity="0.55"/>
    <circle cx="250" cy="250" r="5" fill="#ef4444"><animate attributeName="r" values="5;8;5" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle r="3.5" fill="#fecaca"><animateMotion dur="2.9s" begin="0.5s" repeatCount="indefinite" path="M250,250 Q400,250 590,170"/></circle>
    <text x="238" y="270" font-size="9" fill="#94a3b8">193.32.x · RU</text>
  </g>
  <g>
    <path id="a3" d="M1060,110 Q800,40 590,170" fill="none" stroke="url(#arcR)" stroke-width="2" opacity="0.55"/>
    <circle cx="1060" cy="110" r="5" fill="#ef4444"><animate attributeName="r" values="5;8;5" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle r="3.5" fill="#fecaca"><animateMotion dur="2.6s" begin="0.9s" repeatCount="indefinite" path="M1060,110 Q800,40 590,170"/></circle>
    <text x="1010" y="98" font-size="9" fill="#94a3b8">157.245.x · US</text>
  </g>
  <!-- allowed (green) -->
  <g>
    <path id="a4" d="M980,255 Q780,260 590,170" fill="none" stroke="url(#arcG)" stroke-width="2" opacity="0.5"/>
    <circle cx="980" cy="255" r="5" fill="#22c55e"><animate attributeName="r" values="5;8;5" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle r="3.5" fill="#bbf7d0"><animateMotion dur="3.2s" begin="0.3s" repeatCount="indefinite" path="M980,255 Q780,260 590,170"/></circle>
    <text x="930" y="275" font-size="9" fill="#94a3b8">10.0.x · trusted</text>
  </g>
  <g>
    <path id="a5" d="M150,200 Q380,210 590,170" fill="none" stroke="url(#arcG)" stroke-width="2" opacity="0.5"/>
    <circle cx="150" cy="200" r="5" fill="#22c55e"><animate attributeName="r" values="5;8;5" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle r="3.5" fill="#bbf7d0"><animateMotion dur="3s" begin="1.1s" repeatCount="indefinite" path="M150,200 Q380,210 590,170"/></circle>
    <text x="138" y="220" font-size="9" fill="#94a3b8">192.168.x · LAN</text>
  </g>

  <!-- legend -->
  <g font-size="11" font-weight="600">
    <circle cx="44" cy="284" r="5" fill="#ef4444"/><text x="56" y="288" fill="#cbd5e1">Blocked</text>
    <circle cx="140" cy="284" r="5" fill="#22c55e"/><text x="152" y="288" fill="#cbd5e1">Allowed</text>
    <circle cx="238" cy="284" r="5" fill="#22d3ee"/><text x="250" y="288" fill="#cbd5e1">Whitelisted</text>
  </g>
  <text x="1146" y="288" text-anchor="end" font-size="11" fill="#475569">/ips · world traffic + decision overlay</text>
</svg>
