<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="ARIA - Adaptive Response Intelligence Automation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b16"/>
      <stop offset="0.55" stop-color="#0a1020"/>
      <stop offset="1" stop-color="#05080f"/>
    </linearGradient>
    <linearGradient id="ariaFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1.2 0" dur="3.2s" repeatCount="indefinite"/>
    </linearGradient>
    <mask id="ariaMask">
      <text x="450" y="118" text-anchor="middle" font-size="104" font-weight="800" fill="#fff" letter-spacing="14">ARIA</text>
    </mask>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="900" height="240" rx="20" fill="url(#bg)"/>

  <!-- animated topographic-ish wave lines -->
  <g stroke="#22d3ee" fill="none" opacity="0.18">
    <path d="M-100,170 C120,120 260,210 460,160 C660,110 760,200 1000,150">
      <animate attributeName="opacity" values="0.10;0.28;0.10" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M-100,195 C140,150 300,225 500,180 C700,135 820,215 1000,175" opacity="0.12">
      <animate attributeName="opacity" values="0.06;0.20;0.06" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ARIA wordmark with animated gradient + shine -->
  <text x="450" y="118" text-anchor="middle" font-size="104" font-weight="800" fill="url(#ariaFill)" letter-spacing="14" filter="url(#soft)" opacity="0.55">ARIA</text>
  <text x="450" y="118" text-anchor="middle" font-size="104" font-weight="800" fill="url(#ariaFill)" letter-spacing="14">ARIA</text>
  <rect x="0" y="20" width="900" height="120" fill="url(#shine)" mask="url(#ariaMask)"/>

  <!-- tagline -->
  <text x="450" y="158" text-anchor="middle" font-size="20" font-weight="600" fill="#cbd5e1" letter-spacing="2">Adaptive Response Intelligence Automation</text>

  <!-- animated scanline under title -->
  <line x1="250" y1="178" x2="650" y2="178" stroke="#1e293b" stroke-width="2"/>
  <circle cy="178" r="4" fill="#22d3ee">
    <animate attributeName="cx" values="250;650;250" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="3.6s" repeatCount="indefinite"/>
  </circle>

  <!-- capability chips -->
  <g font-size="12.5" font-weight="600" letter-spacing="1.5" fill="#7dd3fc" text-anchor="middle">
    <text x="450" y="206">LOCAL-FIRST&#160;&#160;·&#160;&#160;SOC / SOAR&#160;&#160;·&#160;&#160;AI INVESTIGATION&#160;&#160;·&#160;&#160;APPROVAL-GATED ANSIBLE&#160;&#160;·&#160;&#160;ES-VERIFIED</text>
  </g>
</svg>
