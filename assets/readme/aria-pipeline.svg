<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 210" width="1000" height="210" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="ARIA detection-to-response pipeline">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1020"/><stop offset="1" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/><stop offset="0.5" stop-color="#22d3ee"/><stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="nodeg" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#172033"/><stop offset="1" stop-color="#0d1424"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <rect width="1000" height="210" rx="18" fill="url(#pbg)"/>
  <text x="28" y="34" font-size="14" font-weight="700" letter-spacing="3" fill="#64748b">DETECTION → RESPONSE PIPELINE</text>

  <!-- connector -->
  <line x1="70" y1="96" x2="930" y2="96" stroke="#1e293b" stroke-width="3"/>
  <line x1="70" y1="96" x2="930" y2="96" stroke="url(#flow)" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 12">
    <animate attributeName="stroke-dashoffset" from="0" to="-44" dur="0.9s" repeatCount="indefinite"/>
  </line>
  <!-- travelling pulse -->
  <circle r="6" fill="#22d3ee" filter="url(#glow)">
    <animateMotion dur="4.2s" repeatCount="indefinite" path="M70,96 L930,96"/>
    <animate attributeName="r" values="5;9;5" dur="1.1s" repeatCount="indefinite"/>
  </circle>

  <!-- nodes -->
  <g text-anchor="middle">
    <!-- node template repeated; cx values 70..930 step ~123 -->
    <!-- 1 -->
    <g>
      <circle cx="70" cy="96" r="26" fill="url(#nodeg)" stroke="#22d3ee" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="4.2s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <text x="70" y="102" font-size="20">📡</text>
      <text x="70" y="146" font-size="12.5" font-weight="700" fill="#e2e8f0">Telemetry</text>
      <text x="70" y="163" font-size="10.5" fill="#64748b">Wazuh·Suricata·Falco</text>
    </g>
    <!-- 2 -->
    <g>
      <circle cx="193" cy="96" r="26" fill="url(#nodeg)" stroke="#22d3ee" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="4.2s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <text x="193" y="102" font-size="20">🔎</text>
      <text x="193" y="146" font-size="12.5" font-weight="700" fill="#e2e8f0">Elasticsearch</text>
      <text x="193" y="163" font-size="10.5" fill="#64748b">read-only source</text>
    </g>
    <!-- 3 -->
    <g>
      <circle cx="316" cy="96" r="26" fill="url(#nodeg)" stroke="#22d3ee" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="4.2s" begin="1.0s" repeatCount="indefinite"/>
      </circle>
      <text x="316" y="102" font-size="20">⚙️</text>
      <text x="316" y="146" font-size="12.5" font-weight="700" fill="#e2e8f0">Normalize</text>
      <text x="316" y="163" font-size="10.5" fill="#64748b">map·enrich·dedup</text>
    </g>
    <!-- 4 -->
    <g>
      <circle cx="439" cy="96" r="26" fill="url(#nodeg)" stroke="#22d3ee" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="4.2s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="439" y="102" font-size="20">🔗</text>
      <text x="439" y="146" font-size="12.5" font-weight="700" fill="#e2e8f0">Correlate</text>
      <text x="439" y="163" font-size="10.5" fill="#64748b">alerts → incidents</text>
    </g>
    <!-- 5 -->
    <g>
      <circle cx="562" cy="96" r="26" fill="url(#nodeg)" stroke="#818cf8" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="4.2s" begin="2.0s" repeatCount="indefinite"/>
      </circle>
      <text x="562" y="102" font-size="20">🧠</text>
      <text x="562" y="146" font-size="12.5" font-weight="700" fill="#e2e8f0">AI Investigate</text>
      <text x="562" y="163" font-size="10.5" fill="#64748b">root-cause + plan</text>
    </g>
    <!-- 6 -->
    <g>
      <circle cx="685" cy="96" r="26" fill="url(#nodeg)" stroke="#22d3ee" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="4.2s" begin="2.5s" repeatCount="indefinite"/>
      </circle>
      <text x="685" y="102" font-size="20">🛡️</text>
      <text x="685" y="146" font-size="12.5" font-weight="700" fill="#e2e8f0">Approval</text>
      <text x="685" y="163" font-size="10.5" fill="#64748b">human-in-the-loop</text>
    </g>
    <!-- 7 -->
    <g>
      <circle cx="808" cy="96" r="26" fill="url(#nodeg)" stroke="#22d3ee" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="4.2s" begin="3.0s" repeatCount="indefinite"/>
      </circle>
      <text x="808" y="102" font-size="20">🛠️</text>
      <text x="808" y="146" font-size="12.5" font-weight="700" fill="#e2e8f0">Ansible</text>
      <text x="808" y="163" font-size="10.5" fill="#64748b">staged remediation</text>
    </g>
    <!-- 8 -->
    <g>
      <circle cx="930" cy="96" r="26" fill="url(#nodeg)" stroke="#27c93f" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="4.2s" begin="3.5s" repeatCount="indefinite"/>
      </circle>
      <text x="930" y="102" font-size="20">✅</text>
      <text x="930" y="146" font-size="12.5" font-weight="700" fill="#e2e8f0">Verify</text>
      <text x="930" y="163" font-size="10.5" fill="#64748b">ES-confirm + archive</text>
    </g>
  </g>
</svg>
