<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSOAR - Approval Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #334155; }
        header h1 { font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .badge { background: #3b82f6; padding: 4px 12px; border-radius: 20px; font-size: 14px; }
        
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 12px; flex: 1; border: 1px solid #334155; }
        .stat-card h3 { color: #94a3b8; font-size: 14px; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: bold; }
        .stat-card.high .value { color: #ef4444; }
        .stat-card.medium .value { color: #f59e0b; }
        .stat-card.low .value { color: #22c55e; }
        
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        
        .list { background: #1e293b; border-radius: 12px; border: 1px solid #334155; max-height: 70vh; overflow-y: auto; }
        .list-item { padding: 15px; border-bottom: 1px solid #334155; cursor: pointer; transition: background 0.2s; }
        .list-item:hover { background: #334155; }
        .list-item.active { background: #3b82f6; }
        .list-item .title { font-weight: 600; margin-bottom: 5px; }
        .list-item .meta { font-size: 12px; color: #94a3b8; }
        .list-item .severity { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 8px; }
        .severity.high { background: #ef4444; }
        .severity.medium { background: #f59e0b; }
        .severity.low { background: #22c55e; }
        
        .detail { background: #1e293b; border-radius: 12px; border: 1px solid #334155; padding: 25px; }
        .detail h2 { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .section { margin-bottom: 25px; }
        .section h3 { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .section p { line-height: 1.6; }
        
        .playbook { background: #0f172a; padding: 15px; border-radius: 8px; font-family: 'Monaco', 'Consolas', monospace; font-size: 13px; white-space: pre-wrap; overflow-x: auto; border: 1px solid #334155; }
        
        .actions { display: flex; gap: 15px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #334155; }
        .btn { padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-approve { background: #22c55e; color: white; }
        .btn-approve:hover { background: #16a34a; }
        .btn-decline { background: #ef4444; color: white; }
        .btn-decline:hover { background: #dc2626; }
        
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .result { padding: 20px; border-radius: 8px; margin-top: 20px; }
        .result.success { background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; }
        .result.error { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; }
        .result.info { background: rgba(59, 130, 246, 0.1); border: 1px solid #3b82f6; }
        
        .empty-state { text-align: center; padding: 60px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ OpenSOAR <span style="color:#64748b">Approval Dashboard</span></h1>
            <span class="badge" id="totalCount">0 Pending</span>
        </header>
        
        <div class="stats">
            <div class="stat-card high">
                <h3>🔴 High Severity</h3>
                <div class="value" id="highCount">0</div>
            </div>
            <div class="stat-card medium">
                <h3>🟡 Medium Severity</h3>
                <div class="value" id="mediumCount">0</div>
            </div>
            <div class="stat-card low">
                <h3>🟢 Low Severity</h3>
                <div class="value" id="lowCount">0</div>
            </div>
        </div>
        
        <div class="grid">
            <div class="list" id="investigationList">
                <div class="empty-state">Loading investigations...</div>
            </div>
            
            <div class="detail" id="detailPanel">
                <div class="empty-state">Select an investigation to view details</div>
            </div>
        </div>
    </div>

    <script>
        let investigations = [];
        let selectedId = null;
        
        async function loadInvestigations() {
            const res = await fetch('/api/v1/investigations?status=awaiting_approval&limit=100');
            const data = await res.json();
            investigations = data.investigations || [];
            renderList();
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('totalCount').textContent = `${investigations.length} Pending`;
            document.getElementById('highCount').textContent = investigations.filter(i => i.incident_severity === 'high').length;
            document.getElementById('mediumCount').textContent = investigations.filter(i => i.incident_severity === 'medium').length;
            document.getElementById('lowCount').textContent = investigations.filter(i => i.incident_severity === 'low').length;
        }
        
        function renderList() {
            const list = document.getElementById('investigationList');
            if (investigations.length === 0) {
                list.innerHTML = '<div class="empty-state">✅ No investigations awaiting approval</div>';
                return;
            }
            
            list.innerHTML = investigations.map(inv => `
                <div class="list-item ${inv.id === selectedId ? 'active' : ''}" onclick="selectInvestigation('${inv.id}')">
                    <div class="title">${inv.incident_title?.substring(0, 40) || 'Untitled'}...</div>
                    <div class="meta">
                        <span class="severity ${inv.incident_severity}">${inv.incident_severity.toUpperCase()}</span>
                        ${new Date(inv.created_at).toLocaleString()}
                    </div>
                </div>
            `).join('');
        }
        
        async function selectInvestigation(id) {
            selectedId = id;
            renderList();
            
            const inv = investigations.find(i => i.id === id);
            const detail = document.getElementById('detailPanel');
            
            detail.innerHTML = `
                <h2>
                    <span>📋 ${inv.incident_title?.substring(0, 50) || 'Investigation'}</span>
                    <span class="severity ${inv.incident_severity}">${inv.incident_severity.toUpperCase()}</span>
                </h2>
                
                <div class="section">
                    <h3>AI Summary</h3>
                    <p>${inv.ai_summary || 'No summary available'}</p>
                </div>
                
                <div class="section">
                    <h3>Risk Assessment</h3>
                    <p>${inv.ai_risk || 'No risk assessment'}</p>
                </div>
                
                <div class="section">
                    <h3>Investigation Details</h3>
                    <p><strong>Target Host:</strong> ${inv.target_host || 'Unknown'}</p>
                    <p><strong>Source IPs:</strong> ${inv.source_ips || 'Unknown'}</p>
                    <p><strong>MITRE Tactics:</strong> ${inv.mitre_tactics || 'None identified'}</p>
                    <p><strong>Created:</strong> ${new Date(inv.created_at).toLocaleString()}</p>
                </div>
                
                <div class="section">
                    <h3>Generated Playbook</h3>
                    <div class="playbook">${inv.playbook_yaml || 'No playbook generated'}</div>
                </div>
                
                <div class="actions">
                    <button class="btn btn-approve" onclick="approveInvestigation('${id}')" id="approveBtn">
                        ✅ Approve & Execute
                    </button>
                    <button class="btn btn-decline" onclick="declineInvestigation('${id}')" id="declineBtn">
                        ❌ Decline
                    </button>
                </div>
                
                <div id="actionResult"></div>
            `;
        }
        
        async function approveInvestigation(id) {
            const btn = document.getElementById('approveBtn');
            const result = document.getElementById('actionResult');
            
            btn.innerHTML = '<span class="spinner"></span> Approving...';
            btn.disabled = true;
            
            try {
                const res = await fetch(`/api/v1/investigations/${id}/approve`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({decided_by: 'dashboard'})
                });
                
                if (res.ok) {
                    const data = await res.json();
                    result.innerHTML = `
                        <div class="result success">
                            <strong>✅ Approved!</strong><br>
                            ${data.message}<br>
                            <small>Playbook execution has started. Check /monitor/stats for progress.</small>
                        </div>
                    `;
                    btn.innerHTML = '✅ Approved';
                    setTimeout(() => loadInvestigations(), 2000);
                } else {
                    const err = await res.json();
                    result.innerHTML = `<div class="result error"><strong>❌ Error:</strong> ${err.detail}</div>`;
                    btn.innerHTML = '✅ Approve & Execute';
                    btn.disabled = false;
                }
            } catch (e) {
                result.innerHTML = `<div class="result error"><strong>❌ Error:</strong> ${e.message}</div>`;
                btn.innerHTML = '✅ Approve & Execute';
                btn.disabled = false;
            }
        }
        
        async function declineInvestigation(id) {
            const btn = document.getElementById('declineBtn');
            const result = document.getElementById('actionResult');
            
            btn.innerHTML = '<span class="spinner"></span> Declining...';
            btn.disabled = true;
            
            try {
                const res = await fetch(`/api/v1/investigations/${id}/decline`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({decided_by: 'dashboard', reason: 'Declined via dashboard'})
                });
                
                if (res.ok) {
                    result.innerHTML = `
                        <div class="result info">
                            <strong>❌ Declined</strong><br>
                            Investigation has been archived with "declined" status.<br>
                            <small>It will no longer appear in the approval list.</small>
                        </div>
                    `;
                    btn.innerHTML = '❌ Declined';
                    setTimeout(() => loadInvestigations(), 2000);
                } else {
                    const err = await res.json();
                    result.innerHTML = `<div class="result error"><strong>❌ Error:</strong> ${err.detail}</div>`;
                    btn.innerHTML = '❌ Decline';
                    btn.disabled = false;
                }
            } catch (e) {
                result.innerHTML = `<div class="result error"><strong>❌ Error:</strong> ${e.message}</div>`;
                btn.innerHTML = '❌ Decline';
                btn.disabled = false;
            }
        }
        
        loadInvestigations();
        setInterval(loadInvestigations, 30000);
    </script>
</body>
</html>
