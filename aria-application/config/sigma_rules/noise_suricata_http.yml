title: Suricata HTTP Protocol Noise
description: Filter out HTTP protocol parsing artifacts that are not security-relevant
status: experimental
logsource:
  product: suricata
detection:
  selection:
    - signature|contains:
        - 'http request line incomplete'
        - 'http host header ambiguous'
        - 'http host part of uri is invalid'
        - 'http response buffer too long'
        - 'http invalid response chunk'
        - 'http unable to match response to request'
        - 'http header too long'
        - 'http invalid request line'
        - 'http invalid content-length'
        - 'http invalid server response'
        - 'http missing host header'
        - 'http request field too long'
        - 'http response field too long'
        - 'http method too long'
        - 'http uri too long'
  condition: selection
