# Example only. The installer generates /etc/telegraf/telegraf.conf dynamically.
 [agent]
    interval = "10s"
    round_interval = true
    metric_batch_size = 1000
    metric_buffer_limit = 10000
    flush_interval = "10s"
    flush_jitter = "1s"
    precision = ""
    hostname = ""
    omit_hostname = false

  [global_tags]
    deployment = "soc"
    role = "control-plane"

  [[outputs.elasticsearch]]
    urls = ["https://ELASTICSEARCH_HOST:9200"]
    timeout = "5s"
    enable_sniffer = false
    health_check_interval = "10s"
    username = "elastic"
    password = "CHANGE_ME"
    index_name = "telegraf-%Y.%m.%d"
    manage_template = true
    template_name = "telegraf"
    overwrite_template = false
    tls_ca = "/etc/telegraf/certs/elasticsearch-ca.crt"
    insecure_skip_verify = false

  [[inputs.cpu]]
    percpu = true
    totalcpu = true
    collect_cpu_time = false
    report_active = true

  [[inputs.mem]]
  [[inputs.swap]]
  [[inputs.disk]]
    ignore_fs = ["tmpfs", "devtmpfs", "devfs", "overlay", "squashfs"]
  [[inputs.diskio]]
  [[inputs.kernel]]
  [[inputs.processes]]
  [[inputs.system]]
  [[inputs.net]]
  [[inputs.netstat]]
  [[inputs.linux_sysctl_fs]]
  [[inputs.internal]]

  [[inputs.procstat]]
    pattern = ".*"
    pid_finder = "native"
